name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Update version from tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          Write-Host "Updating version to: $version"

          # Update tauri.conf.json (replace version field in-place)
          $tauriConf = Get-Content "src-tauri/tauri.conf.json" -Raw
          $tauriConf = $tauriConf -replace '"version":\s*"[^"]*"', "`"version`": `"$version`""
          Set-Content "src-tauri/tauri.conf.json" $tauriConf -Encoding UTF8 -NoNewline

          # Update Cargo.toml (only the first version line in [package])
          $cargoToml = Get-Content "src-tauri/Cargo.toml" -Raw
          $cargoToml = $cargoToml -replace '(?m)^version = "[^"]+"', "version = `"$version`""
          Set-Content "src-tauri/Cargo.toml" $cargoToml -Encoding UTF8 -NoNewline

          Write-Host "Version updated successfully to $version"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: |
            ## 更新内容
            - 自动构建发布
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
