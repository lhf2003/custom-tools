name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Update version from tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          Write-Host "Updating version to: $version"

          # Update tauri.conf.json (replace version field in-place)
          $tauriConf = Get-Content "src-tauri/tauri.conf.json" -Raw
          $tauriConf = $tauriConf -replace '"version":\s*"[^"]*"', "`"version`": `"$version`""
          Set-Content "src-tauri/tauri.conf.json" $tauriConf -Encoding UTF8 -NoNewline

          # Update Cargo.toml (only the first version line in [package])
          $cargoToml = Get-Content "src-tauri/Cargo.toml" -Raw
          $cargoToml = $cargoToml -replace '(?m)^version = "[^"]+"', "version = `"$version`""
          Set-Content "src-tauri/Cargo.toml" $cargoToml -Encoding UTF8 -NoNewline

          Write-Host "Version updated successfully to $version"

      - name: Sync version and changelog to UI
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $today = Get-Date -Format 'yyyy-MM-dd'

          # 读取完整 tag message（保留原始格式，只去掉签名部分）
          $fullMsg = git tag -l --format='%(contents)' $tag
          # 去掉可能的 GPG 签名部分
          $fullMsg = $fullMsg -replace '(?s)\n-----BEGIN PGP SIGNATURE-----.*', ''
          # 按行分割，过滤空行
          $lines = $fullMsg -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }

          # 提取类型（第一行如果是 feat/fix/refactor 等）
          $tagType = 'feat'
          $items = [System.Collections.Generic.List[string]]::new()

          for ($i = 0; $i -lt $lines.Count; $i++) {
            $line = $lines[$i]
            if ($i -eq 0 -and $line -match '^(feat|fix|refactor|docs|chore|perf|test|ci|build)$') {
              $tagType = $line
            } else {
              # 其他所有非空行都作为 changelog 条目
              $items.Add($line)
            }
          }

          # 1. 更新 AboutSettings.tsx 版本号
          $aboutPath = "src/modules/settings/tabs/AboutSettings.tsx"
          $aboutContent = [System.IO.File]::ReadAllText($aboutPath, [System.Text.Encoding]::UTF8)
          $aboutContent = $aboutContent -replace '版本 \d+\.\d+\.\d+', "版本 $version"
          [System.IO.File]::WriteAllText($aboutPath, $aboutContent, [System.Text.Encoding]::UTF8)
          Write-Host "Updated AboutSettings.tsx: 版本 $version"

          # 2. 在 ChangelogSettings.tsx CHANGELOG 数组开头插入新条目
          $changelogPath = "src/modules/settings/tabs/ChangelogSettings.tsx"
          $changelogContent = [System.IO.File]::ReadAllText($changelogPath, [System.Text.Encoding]::UTF8)

          $itemLines = ($items | ForEach-Object { "      '$_'," }) -join "`n"
          $newEntry = "  {`n    version: '$version',`n    date: '$today',`n    tag: '$tagType',`n    items: [`n$itemLines`n    ],`n  },"

          $changelogContent = $changelogContent -replace '(const CHANGELOG: ChangelogEntry\[\] = \[)', "`$1`n$newEntry"
          [System.IO.File]::WriteAllText($changelogPath, $changelogContent, [System.Text.Encoding]::UTF8)
          Write-Host "Updated ChangelogSettings.tsx: added v$version entry"

      - name: Get tag message
        id: tag_message
        shell: pwsh
        run: |
          # 直接获取完整 tag message，保留原始格式
          $msg = git tag -l --format='%(contents)' "${{ github.ref_name }}"
          # 去掉可能的 GPG 签名部分
          $msg = $msg -replace '(?s)\n-----BEGIN PGP SIGNATURE-----.*', ''
          if (-not $msg.Trim()) {
            $msg = "## 更新内容`n- 版本 ${{ github.ref_name }}"
          }
          # GitHub Actions multiline output
          $delimiter = "EOF_$(Get-Random)"
          "body<<$delimiter" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $msg | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $delimiter | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: ${{ steps.tag_message.outputs.body }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
